<!DOCTYPE html>
<html lang = "en">
    <head>
        <meta charset = "UTF-8">
        <title>Home Page</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
        <!-- WHEN YOU ADD AN HTML FILE YOU WILL BE DOING IT INSIDE A FOLDER. THIS THEREFORE MEANS TO ACCESS THE CUSTOM CSS FILE YOU WILL NEED TO CHANGE THE HREF TO BE ../custom.css -->
        <link rel="stylesheet" href="../custom.css">
    </head>
    
    <body onload="console.log('You have navigated to the home page')">
        <div class="nav-bar">
          <div class="nav-barLogo" id="navHome">chefbook</div>
          <div class="nav-barButtons">
            <button>Explore</button>  
            <button>My Recipes</button>
            <button>Saved</button>
            <button>My Kitchen</button>
          </div>
          <button class="profile-btn" data-bs-toggle="offcanvas" data-bs-target="#profilePanel" aria-controls="profilePanel">?</button>
        </div>

        <div class="explore-bar">
          <h3>Explore</h3>
          <input type="text" class="search-bar" placeholder="Search recipes, ingredients, chefs...">
        </div>



        <div class = "div_main">


        </div>

      

    <div class="offcanvas offcanvas-end" tabindex="-1" id="profilePanel" aria-labelledby="profilePanelLabel">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="profilePanelLabel">Profile</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
      </div>

      <div class="offcanvas-body">
        <p><strong>Account</strong></p>
        <p>My Recipes</p>
        <p>Saved Recipes</p>
        <p>Settings</p>
        <hr>
        <button class="log-outbtn">Logout</button>
      </div>
    </div>
    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
