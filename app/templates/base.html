<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>{% block title %}{% endblock %}</title>

        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="{{ url_for('static', filename='custom.css') }}">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

        {% block scripts %}{% endblock %}
    </head>

    <body>
        <nav class="navbar">
            <div class="logo">CookBook <i class="bi bi-book"></i></div>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/explore">Explore</a></li>
                <li><a href="/my-recipes">My Recipes</a></li>
                <li><a href="/create_recipe/0">Create_Recipe (TEMPORARY)</a></li>
                <li><a href="/saved">Saved</a></li>
                <li><a href="/mykitchen">MyKitchen</a></li>
                <li><a href="/shopping_list"><i class="bi bi-cart3"></i></a></li>
                <li><a href="/notifications"><i class="bi bi-bell-fill"></i></a></li>
            </ul>
            <a href="/profile"><img src ="https://gleephoria.in/wp-content/uploads/2024/10/WhatsApp-Image-2023-07-14-at-6.04.12-PM.jpeg" class="profile-btn"></a>
        </nav>

        {% block header %}{% endblock %}

        <div class="div_main">
            {% block content %}{% endblock %}
        </div>

    </body>
</html>
