<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Sign up — CookBook</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="{{ url_for('static', filename='custom.css') }}">
    </head>
    <body onload="console.log('You have navigated to the Sign up page')">
        <nav class="navbar">
            <div class="logo">CookBook</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="explore.html">Explore</a></li>
                <li><a href="my-recipes.html">My Recipes</a></li>
                <li><a href="saved.html">Saved</a></li>
                <li><a href="mykitchen.html">MyKitchen</a></li>
                <li><a href="profile.html">Profile</a></li>
            </ul>
        </nav>

        <div class="div_main">
            <h1>Sign up</h1>
            <form name="Sign Up" action="/signup" method="POST">
                <br>

                <fieldset class="outer_fieldset">
                    <legend>Account</legend>
                    Username:
                    <input id="username" name="username" type="text" autocomplete="username" required autofocus>
                    <br>
                    <br>
                    Email:
                    <input id="email" name="email" type="email" autocomplete="email" required>
                    <br>
                    <br>
                    Password:
                    <input id="password" name="password" type="password" autocomplete="new-password" required>
                    <br>
                    <br>
                    Confirm Password:
                    <input id="confirmPassword" name="confirm_password" type="password" autocomplete="new-password" required>
                </fieldset>
                <br>
                <br>

                <button type="submit" class="btn btn-primary">Sign up</button>
                <br>
                <br>
                <p>Already have an account? <a href="/login">Log in</a></p>
            </form>
        </div>
    </body>
</html>
